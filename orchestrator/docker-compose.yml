services:
  orchestrator:
    build:
      context: ..
      dockerfile: orchestrator/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    extra_hosts:
      - "render.replowapp.com:187.77.150.149"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
